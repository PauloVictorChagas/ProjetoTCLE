{% extends 'usuarios/base.html' %}
{% block content %}
<div class="p-8 max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
        <div class="flex items-center gap-3 mb-6">
            <i data-lucide="lock-keyhole" class="w-8 h-8 text-blue-600"></i>
            <div>
                <h1 class="text-xl font-bold text-slate-900">Nova Senha</h1>
                <p class="text-sm text-slate-500">Este é seu primeiro acesso.</p>
            </div>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="text-sm font-medium text-slate-700">Digite a Nova Senha</label>
                <input type="password" name="senha1" required minlength="6"
                    class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Confirme a Nova Senha</label>
                <input type="password" name="senha2" required minlength="6"
                    class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700 transition-colors mt-4">
                Salvar e Acessar o Sistema
            </button>
        </form>
    </div>
</div>
{% endblock %}
